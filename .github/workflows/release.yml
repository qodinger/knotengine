name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Validate version
        id: validate
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Version mismatch: tag (v$TAG_VERSION) != package.json ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Extract Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          echo "Extracting notes for v$VERSION"

          # Extract content between the version header and the next header
          # Matches formats: ## [0.2.0], ## 0.2.0, etc.
          NOTES=$(awk -v ver="[$VERSION]" '
            /^## / { if (p) { exit }; if ($2 == ver || $2 == substr(ver, 2, length(ver)-2)) { p=1; next } }
            p { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "⚠️ No notes found for v$VERSION in CHANGELOG.md"
            NOTES="Detailed changes available in [CHANGELOG.md](https://github.com/qodinger/knotengine/blob/main/CHANGELOG.md)."
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.validate.outputs.version }}
          body: |
            ## 🚀 KnotEngine v${{ steps.validate.outputs.version }}

            ${{ steps.release_notes.outputs.notes }}

            ---
            **[View Full Changelog](https://github.com/qodinger/knotengine/blob/main/CHANGELOG.md)**
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
