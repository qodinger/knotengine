version: "3.8"
services:
  mongodb:
    image: mongo:7-jammy
    container_name: knotengine_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: tyecode
      MONGO_INITDB_ROOT_PASSWORD: knotengine_local_password
      MONGO_INITDB_DATABASE: knotengine
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: knotengine_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
